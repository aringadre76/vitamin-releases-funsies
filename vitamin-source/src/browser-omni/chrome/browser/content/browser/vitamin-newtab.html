<!-- Vitamin Browser - New Tab Page -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src chrome:; img-src chrome: blob:; object-src 'none'; style-src 'unsafe-inline'; form-action https:;" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Tab</title>
    <link rel="icon" type="image/png" href="chrome://branding/content/icon32.png" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      :root { --accent: #ff6b00; --accent-light: #ff8533; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body { margin: 0; padding: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; position: relative; min-height: 100vh; }
      .glow { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; }
      .glow-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -100px; animation: drift1 25s ease-in-out infinite; }
      .glow-2 { width: 400px; height: 400px; background: var(--accent-light); bottom: -150px; left: -100px; animation: drift2 30s ease-in-out infinite; }
      .glow-3 { width: 300px; height: 300px; background: var(--accent); top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.08; animation: pulse 20s ease-in-out infinite; }
      @keyframes drift1 { 0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.15; } 25% { transform: translate(-80px, 60px) scale(1.1); opacity: 0.12; } 50% { transform: translate(-40px, 100px) scale(0.95); opacity: 0.18; } 75% { transform: translate(40px, 40px) scale(1.05); opacity: 0.13; } }
      @keyframes drift2 { 0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.15; } 33% { transform: translate(100px, -60px) scale(1.15); opacity: 0.12; } 66% { transform: translate(50px, -100px) scale(0.9); opacity: 0.17; } }
      @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.08; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.05; } }
      .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 40px; }
      .logo { font-size: 14px; letter-spacing: 8px; text-transform: uppercase; color: #333; user-select: none; }
      .logo-bold { font-weight: 700; color: #444; transition: color 0.5s ease, text-shadow 0.5s ease; cursor: default; }
      .logo-light { font-weight: 400; }
      .logo-bold:hover { color: #ff6b00; text-shadow: 0 0 5px #ff6b00, 0 0 10px #ff6b00, 0 0 20px #ff8533; }
      /* Poison active indicator - controlled by parent process via data attribute */
      html[data-poison-active] .logo-bold {
        color: #ff6b00;
        text-shadow: 0 0 5px #ff6b00, 0 0 15px #ff6b00, 0 0 30px #ff8533, 0 0 50px #ff6b00;
        animation: poison-pulse 2s ease-in-out infinite;
      }
      @keyframes poison-pulse {
        0%, 100% { text-shadow: 0 0 5px #ff6b00, 0 0 15px #ff6b00, 0 0 30px #ff8533, 0 0 50px #ff6b00; }
        50% { text-shadow: 0 0 10px #ff6b00, 0 0 25px #ff6b00, 0 0 45px #ff8533, 0 0 70px #ff6b00; }
      }
      .search-inner-wrapper { position: relative; width: 580px; max-width: calc(100vw - 40px); }
      .search-box-wrapper { position: relative; width: 100%; }
      .search-box { width: 100%; height: 52px; padding: 0 24px 0 52px; border: 1px solid #1a1a1a; border-radius: 16px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); color: #fff; font-size: 15px; font-family: inherit; transition: all 0.2s ease; }
      .search-box:focus { outline: none; border-color: var(--accent); background: rgba(25, 25, 25, 0.9); box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.15); }
      .search-box::placeholder { color: #555; }
      .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #555; pointer-events: none; transition: color 0.2s ease; }
      .search-box:focus + .search-icon { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="container">
      <div class="logo"><span class="logo-bold">Vita</span><span class="logo-light">min</span></div>
      <form class="search-inner-wrapper" action="https://duckduckgo.com/" method="get">
        <div class="search-box-wrapper">
          <input type="text" name="q" class="search-box" placeholder="Search with DuckDuckGo" autocomplete="off" autofocus />
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </div>
      </form>
    </div>
  </body>
</html>
